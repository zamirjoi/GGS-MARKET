<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050814;
            --card-bg: rgba(17, 24, 39, 0.45);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.4);
            --input-border: rgba(255, 255, 255, 0.08);
            --glow: rgba(99, 102, 241, 0.4);
            --error: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- PREMIUM GLOW PARTICLE EFFECT --- */
        #particles-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background-image: radial-gradient(circle at center, rgba(11, 15, 25, 0.8), #050814);
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: #6366f1;
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: #c084fc;
            bottom: -150px; right: -100px;
            animation-delay: -5s;
            animation-duration: 25s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 60px) scale(1.2); }
        }

        .glowing-particle {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 12px 2px rgba(99, 102, 241, 0.8), 0 0 24px 4px rgba(192, 132, 252, 0.6);
            animation: floatParticle linear infinite alternate;
        }

        @keyframes floatParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            50% { opacity: var(--max-opacity); }
            100% { transform: translate(var(--tx), var(--ty)) scale(var(--scale)); opacity: 0.1; }
        }

        /* --- MAIN CONTAINER --- */
        .checkout-container {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, #a5b4fc, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control, .custom-select-trigger {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            cursor: text;
        }

        .custom-select-trigger {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .custom-select-trigger .arrow {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            transition: all 0.4s ease;
            pointer-events: none;
            font-size: 16px;
            z-index: 2;
        }

        .form-control:focus, .custom-select.open .custom-select-trigger {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
            background: rgba(30, 41, 59, 0.6);
        }

        .form-control:focus + .input-icon, .custom-select.open .input-icon {
            color: var(--primary);
            transform: scale(1.1);
        }

        .custom-select.open .arrow {
            transform: rotate(180deg);
            color: var(--primary);
        }

        /* --- CUSTOM DROPDOWN LIST --- */
        .custom-options {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 100;
            max-height: 220px;
            overflow-y: auto;
        }

        .custom-select.open .custom-options {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
            transform: translateY(0);
        }

        .custom-option {
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
        }

        .custom-option:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #fff;
        }

        .custom-option.selected {
            background: rgba(99, 102, 241, 0.3);
            font-weight: 600;
            color: #fff;
        }

        .custom-options::-webkit-scrollbar { width: 6px; }
        .custom-options::-webkit-scrollbar-track { background: transparent; border-radius: 8px; }
        .custom-options::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 8px; }
        .custom-options::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .error-message {
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .buy-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 20px var(--glow);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
        }

        .buy-btn:active { transform: translateY(1px); }
        .buy-btn i { transition: transform 0.3s ease; }
        .buy-btn:hover i { transform: translateX(4px); }
        .buy-btn.loading { pointer-events: none; opacity: 0.8; }

        @media (max-width: 480px) {
            .checkout-container { padding: 30px 20px; border-radius: 20px; }
            .header h2 { font-size: 22px; }
            .form-control, .custom-select-trigger { font-size: 14px; padding: 12px 14px 12px 40px; }
            .input-icon { left: 14px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="particles-container">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
    </div>

    <div class="checkout-container">
        <div class="header">
            <h2>Digital Access</h2>
            <p>Select your premium service</p>
        </div>

        <form id="paymentForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Google Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-control" placeholder="yourname@gmail.com" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
                <div class="error-message" id="emailError"><i class="fas fa-exclamation-circle"></i> Must be a @gmail.com address</div>
            </div>

            <div class="form-group">
                <label>Select Platform</label>
                <div class="input-wrapper custom-select" id="product-dropdown">
                    <div class="custom-select-trigger" tabindex="0">
                        <span class="selected-text" style="color: var(--text-muted)">Choose a service...</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </div>
                    <i class="fas fa-play-circle input-icon"></i>
                    <div class="custom-options">
                        <div class="custom-option" data-value="Netflix">Netflix</div>
                        <div class="custom-option" data-value="Amazon Prime">Amazon Prime</div>
                        <div class="custom-option" data-value="YouTube Premium">YouTube Premium</div>
                        <div class="custom-option" data-value="Crunchyroll">Crunchyroll</div>
                        <div class="custom-option" data-value="Canva Pro">Canva Pro</div>
                        <div class="custom-option" data-value="Zee5">Zee5</div>
                        <div class="custom-option" data-value="Sonyliv">Sonyliv</div>
                        <div class="custom-option" data-value="Hoichoi">Hoichoi</div>
                    </div>
                    <input type="hidden" id="product" required>
                </div>
                <div class="error-message" id="productError"><i class="fas fa-exclamation-circle"></i> Please select a platform</div>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <div class="input-wrapper custom-select" id="method-dropdown">
                    <div class="custom-select-trigger" tabindex="0">
                        <span class="selected-text" style="color: var(--text-muted)">Choose a method...</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </div>
                    <i class="fas fa-wallet input-icon"></i>
                    <div class="custom-options">
                        <div class="custom-option" data-value="UPI">UPI</div>
                        <div class="custom-option" data-value="Crypto">Cryptocurrency (USDT/BTC)</div>
                    </div>
                    <input type="hidden" id="method" required>
                </div>
                <div class="error-message" id="methodError"><i class="fas fa-exclamation-circle"></i> Please select a method</div>
            </div>

            <button type="submit" class="buy-btn" id="buyBtn">
                <span>Secure Checkout</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: REPLACE THESE WITH YOUR OWN
        // ==========================================
        const TELEGRAM_BOT_TOKEN = '8743984360:AAHpe8QNZKXZCfPulnZmhcoB3t3Q4A273cA'; 
        const TELEGRAM_CHAT_ID = '7549804367'; 
        const OWNER_TELEGRAM_USERNAME = 'Zamir_XP'; // e.g. 'johndoe' (NO @ symbol)
        // ==========================================

        // --- GLOW PARTICLE LOGIC ---
        function createParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 40; 
            for (let i = 0; i < particleCount; i++) {
                let particle = document.createElement('div');
                particle.classList.add('glowing-particle');
                let size = Math.random() * 3 + 1 + 'px';
                particle.style.width = size; particle.style.height = size;
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                let tx = (Math.random() - 0.5) * 400 + 'px'; 
                let ty = (Math.random() - 0.5) * 400 + 'px'; 
                particle.style.setProperty('--tx', tx); particle.style.setProperty('--ty', ty);
                particle.style.setProperty('--scale', Math.random() * 1.5 + 0.5); 
                particle.style.setProperty('--max-opacity', Math.random() * 0.7 + 0.3); 
                particle.style.animationDuration = Math.random() * 15 + 15 + 's'; 
                particle.style.animationDelay = Math.random() * -30 + 's'; 
                container.appendChild(particle);
            }
        }
        createParticles();

        // --- CUSTOM DROPDOWN LOGIC ---
        const customSelects = document.querySelectorAll('.custom-select');
        customSelects.forEach(select => {
            const trigger = select.querySelector('.custom-select-trigger');
            const options = select.querySelectorAll('.custom-option');
            const hiddenInput = select.querySelector('input[type="hidden"]');
            const textDisplay = select.querySelector('.selected-text');

            trigger.addEventListener('click', () => {
                customSelects.forEach(s => { if(s !== select) s.classList.remove('open'); });
                select.classList.toggle('open');
            });

            options.forEach(option => {
                option.addEventListener('click', function() {
                    options.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    textDisplay.textContent = this.textContent;
                    textDisplay.style.color = 'var(--text-main)'; 
                    hiddenInput.value = this.dataset.value;
                    select.classList.remove('open');
                });
            });
        });

        window.addEventListener('click', e => {
            customSelects.forEach(select => {
                if (!select.contains(e.target)) select.classList.remove('open');
            });
        });

        // --- FORM SUBMISSION & DUAL TELEGRAM LOGIC ---
        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('buyBtn');
            const emailInput = document.getElementById('email').value.trim();
            const productInput = document.getElementById('product').value;
            const methodInput = document.getElementById('method').value;
            
            const emailError = document.getElementById('emailError');
            const productError = document.getElementById('productError');
            const methodError = document.getElementById('methodError');

            let isValid = true;

            // Strict Validation
            if (!emailInput.toLowerCase().endsWith('@gmail.com')) {
                emailError.style.display = 'block'; isValid = false;
            } else { emailError.style.display = 'none'; }

            if (!productInput) { productError.style.display = 'block'; isValid = false; } 
            else { productError.style.display = 'none'; }

            if (!methodInput) { methodError.style.display = 'block'; isValid = false; } 
            else { methodError.style.display = 'none'; }

            if (!isValid) return;

            btn.classList.add('loading');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Processing...</span>';

            const name = document.getElementById('name').value;
            const orderId = 'ORD-' + Math.random().toString(36).substring(2, 7).toUpperCase();

            // 1. THE BOT CONCEPT: Send FULL details silently in the background
            const botMessage = `🍿 *New Digital Access Order*\n\n` +
                               `*Order ID:* \`${orderId}\`\n` +
                               `*Name:* ${name}\n` +
                               `*Email:* ${emailInput}\n` +
                               `*Service:* ${productInput}\n` +
                               `*Method:* ${methodInput}`;

            const botUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            try {
                // Execute Bot API call
                await fetch(botUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: botMessage,
                        parse_mode: 'Markdown'
                    })
                });

                // 2. THE DM REDIRECT: Force-open the Telegram App
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>Opening Telegram...</span>';
                
                // Formulate the strict DM message (Order ID & Product Only)
                const userMessage = `Hello! I want to complete my payment.\n\nOrder ID: ${orderId}\nProduct: ${productInput}\n\nPlease send me the payment details.`;
                const encodedMessage = encodeURIComponent(userMessage);
                
                // Native app link (tg://)
                const appLink = `tg://resolve?domain=${OWNER_TELEGRAM_USERNAME}&text=${encodedMessage}`;
                // Fallback web link (https://t.me/)
                const webLink = `https://t.me/${OWNER_TELEGRAM_USERNAME}?text=${encodedMessage}`;

                // Try opening the native app first
                window.location.href = appLink;

                // If the app doesn't open within 2 seconds, fallback to the browser link
                setTimeout(function() {
                    window.location.href = webLink;
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                alert('Connection error. Please try again.');
                btn.classList.remove('loading');
                btn.innerHTML = '<span>Secure Checkout</span> <i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
